<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesetrening</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f3f4f6; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 26px; color: #4f46e5; margin-bottom: 4px; }
    h2 { font-size: 22px; color: #4f46e5; margin-bottom: 16px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #e5e7eb; }
    .exercise-options { display: flex; gap: 12px; margin-bottom: 20px; }
    .exercise-btn { flex: 1; padding: 14px; border-radius: 12px; border: 2px solid #e5e7eb; background: #fff; cursor: pointer; text-align: left; }
    .exercise-btn.active { border-color: #4f46e5; background: #eef2ff; }
    .exercise-btn .title { font-weight: 700; font-size: 15px; }
    .exercise-btn .desc { font-size: 13px; color: #6b7280; margin-top: 4px; }
    label { font-weight: 700; display: block; margin-bottom: 8px; }
    textarea { width: 100%; height: 140px; padding: 12px; border-radius: 10px; border: 2px solid #e5e7eb; font-size: 15px; resize: vertical; font-family: inherit; }
    textarea:focus { outline: none; border-color: #4f46e5; }
    .upload-box { padding: 16px; background: #f9fafb; border-radius: 12px; border: 2px dashed #d1d5db; margin-bottom: 20px; }
    .upload-box .title { font-weight: 700; margin-bottom: 8px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; font-family: inherit; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-green { background: #059669; color: #fff; }
    .btn-gray { background: #6b7280; color: #fff; }
    .btn-large { width: 100%; padding: 16px; font-size: 18px; border-radius: 12px; margin-top: 8px; }
    .btn:disabled { background: #d1d5db; cursor: default; }
    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    .range-labels { display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; margin-top: 4px; }
    input[type=range] { width: 100%; margin-top: 4px; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .checkbox-row input { width: 18px; height: 18px; }
    .info-box { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .info-yellow { background: #fef3c7; color: #92400e; }
    .text-display { line-height: 2.6; font-size: 22px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; min-height: 200px; }
    .word-wrap { display: inline-block; margin: 2px 3px; }
    .word { display: inline-block; padding: 2px 7px; border-radius: 6px; border: 2px solid transparent; transition: background 0.15s; }
    .word.current { background: #e0e7ff; border-color: #4f46e5; font-weight: 700; }
    .word.correct { background: #d1fae5; color: #065f46; }
    .word.wrong { background: #fee2e2; color: #991b1b; }
    .word.clickable { cursor: pointer; }
    .word-btns { display: inline-block; margin-left: 4px; }
    .word-btn { padding: 2px 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-right: 2px; }
    .word-btn.ok { background: #059669; color: #fff; }
    .word-btn.fail { background: #dc2626; color: #fff; }
    .stats-row { margin-top: 16px; display: flex; gap: 20px; font-size: 15px; }
    .timer { font-size: 28px; font-weight: 800; color: #4f46e5; }
    .timer.urgent { color: #ef4444; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .result-card { padding: 20px; border-radius: 12px; text-align: center; }
    .result-card .val { font-size: 42px; font-weight: 900; }
    .result-card .lbl { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .progress-bar { height: 24px; background: #e5e7eb; border-radius: 12px; overflow: hidden; position: relative; }
    .progress-fill { height: 100%; border-radius: 12px; transition: width 1s; }
    .progress-marker { position: absolute; top: 2px; left: 66%; width: 2px; height: 20px; background: #4f46e5; }
    .review-text { line-height: 2.2; font-size: 18px; background: #fff; padding: 16px; border-radius: 10px; border: 1px solid #e5e7eb; }
    img#preview { max-height: 150px; border-radius: 8px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const state = {
  mode: 'setup', // setup | reading | result
  exercise: 'word', // word | timed
  inputText: '',
  words: [],
  wordStates: [], // none | correct | wrong
  currentIdx: 0,
  timeLimit: 60,
  timeLeft: 60,
  running: false,
  listenMode: false,
  timerInterval: null,
  recognition: null,
  imageFile: null,
};

function tokenize(text) {
  return text.trim().split(/\s+/).filter(Boolean);
}

function render() {
  const app = document.getElementById('app');
  if (state.mode === 'setup') app.innerHTML = setupHTML();
  else if (state.mode === 'reading') app.innerHTML = readingHTML();
  else app.innerHTML = resultHTML();
  bindEvents();
}

function setupHTML() {
  return `
    <h1>📖 Lesetreningsapp</h1>
    <p class="subtitle">For å trene lesehastighet og nøyaktighet</p>
    <div class="exercise-options">
      <button class="exercise-btn ${state.exercise==='word'?'active':''}" onclick="setExercise('word')">
        <div class="title">📝 Ord for ord</div>
        <div class="desc">Merk riktig/feil underveis</div>
      </button>
      <button class="exercise-btn ${state.exercise==='timed'?'active':''}" onclick="setExercise('timed')">
        <div class="title">⏱ Tidsbasert</div>
        <div class="desc">Les mest mulig på tid</div>
      </button>
    </div>
    ${state.exercise==='timed' ? `
    <div class="card">
      <label>Tid: <span id="timelabel">${state.timeLimit}</span> sekunder</label>
      <input type="range" min="15" max="120" step="15" value="${state.timeLimit}" oninput="setTime(this.value)">
      <div class="range-labels"><span>15s</span><span>120s</span></div>
    </div>` : ''}
    <div class="checkbox-row">
      <input type="checkbox" id="listenCheck" ${state.listenMode?'checked':''} onchange="toggleListen(this.checked)">
      <label for="listenCheck" style="display:inline;font-weight:600">🎤 Automatisk gjenkjenning (barnet leser høyt)</label>
    </div>
    <div class="card">
      <label>Lim inn tekst</label>
      <textarea id="textInput" placeholder="Lim inn tekst fra boken her...">${state.inputText}</textarea>
    </div>
    <div class="upload-box">
      <div class="title">📷 Eller skann en side fra boken</div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn btn-primary" onclick="document.getElementById('imgInput').click()">Velg bilde / Ta foto</button>
        ${state.imageFile ? `<button class="btn btn-green" id="ocrBtn" onclick="runOCR()">Trekk ut tekst</button>` : ''}
      </div>
      <input type="file" id="imgInput" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
      <img id="preview" src="${state.imagePreview||''}" style="display:${state.imagePreview?'block':'none'}">
    </div>
    <button class="btn btn-primary btn-large" onclick="startSession()" ${!state.inputText.trim()?'disabled':''}>Start øvelse 🚀</button>
  `;
}

function readingHTML() {
  const correct = state.wordStates.filter(s=>s==='correct').length;
  const wrong = state.wordStates.filter(s=>s==='wrong').length;
  const wordsHTML = state.words.map((w,i) => {
    const s = state.wordStates[i];
    const isCur = i === state.currentIdx && state.exercise==='word';
    const cls = isCur ? 'current' : s === 'correct' ? 'correct' : s === 'wrong' ? 'wrong' : '';
    const clickable = !state.listenMode && state.exercise==='timed' ? 'clickable' : '';
    const btns = (state.exercise==='word' && isCur && !state.listenMode) ?
      `<span class="word-btns">
        <button class="word-btn ok" onclick="markWord(${i},'correct')">✅</button>
        <button class="word-btn fail" onclick="markWord(${i},'wrong')">❌</button>
      </span>` : '';
    return `<span class="word-wrap"><span class="word ${cls} ${clickable}" onclick="clickWord(${i})">${w}</span>${btns}</span>`;
  }).join('');

  return `
    <div class="header-row">
      <h2>Les teksten</h2>
      <div style="display:flex;gap:12px;align-items:center">
        ${state.exercise==='timed' ? `<div class="timer ${state.timeLeft<=10?'urgent':''}">⏱ ${state.timeLeft}s</div>` : ''}
        <button class="btn btn-gray" onclick="endSession()">Avslutt</button>
      </div>
    </div>
    <div class="info-box info-yellow">
      ${state.listenMode ? '🎤 Barnet leser høyt. Ord merkes automatisk.' :
        state.exercise==='word' ? 'Trykk ✅ eller ❌ for hvert ord etter hvert som barnet leser.' :
        'Trykk på ord som leses FEIL (de blir røde).'}
    </div>
    <div class="text-display">${wordsHTML}</div>
    <div class="stats-row">
      <span style="color:#059669;font-weight:700">✅ Riktig: ${correct}</span>
      <span style="color:#dc2626;font-weight:700">❌ Feil: ${wrong}</span>
      <span style="color:#6b7280">Ord igjen: ${state.words.length - state.currentIdx}</span>
    </div>
  `;
}

function resultHTML() {
  const correct = state.wordStates.filter(s=>s==='correct').length;
  const wrong = state.wordStates.filter(s=>s==='wrong').length;
  const read = state.wordStates.filter(s=>s!=='none').length;
  const wpm = state.exercise==='timed' ? Math.round((correct/state.timeLimit)*60) : null;

  const reviewWords = state.words.map((w,i) => {
    const s = state.wordStates[i];
    const bg = s==='correct'?'#d1fae5':s==='wrong'?'#fee2e2':'#f3f4f6';
    const col = s==='correct'?'#065f46':s==='wrong'?'#991b1b':'#6b7280';
    return `<span style="display:inline-block;margin:2px 3px;padding:2px 7px;border-radius:6px;background:${bg};color:${col}">${w}</span>`;
  }).join('');

  return `
    <h2>🎉 Ferdig!</h2>
    <div class="results-grid">
      <div class="result-card" style="background:#d1fae5"><div class="lbl" style="color:#059669">✅ Riktige ord</div><div class="val" style="color:#059669">${correct}</div></div>
      <div class="result-card" style="background:#fee2e2"><div class="lbl" style="color:#dc2626">❌ Feil ord</div><div class="val" style="color:#dc2626">${wrong}</div></div>
      <div class="result-card" style="background:#eef2ff"><div class="lbl" style="color:#4f46e5">📖 Leste ord</div><div class="val" style="color:#4f46e5">${read}</div></div>
      ${wpm!==null?`<div class="result-card" style="background:#fef3c7"><div class="lbl" style="color:#d97706">🚀 Ord/min</div><div class="val" style="color:#d97706">${wpm}</div></div>`:''}
    </div>
    ${wpm!==null?`
    <div class="card">
      <label>Lesehastighet sammenlignet med snitt</label>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(100,(wpm/150)*100)}%;background:${wpm>=100?'#059669':'#f59e0b'}"></div>
        <div class="progress-marker"></div>
      </div>
      <div class="range-labels"><span>0</span><span style="color:#4f46e5">Snitt (100 ord/min)</span><span>150+</span></div>
      <p style="margin-top:12px;color:${wpm>=100?'#059669':'#d97706'};font-weight:600">
        ${wpm>=100?`Flott! Leser over snittet (${wpm} ord/min)! 🌟`:`Leser ${wpm} ord/min — snittet er 100. Fortsett å øve! 💪`}
      </p>
    </div>` : ''}
    <div class="card">
      <label>Gjennomgang av teksten</label>
      <div class="review-text">${reviewWords}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-large" onclick="reset()">🔄 Ny øvelse</button>
      <button class="btn btn-green btn-large" onclick="tryAgain()">🔁 Prøv igjen</button>
    </div>
  `;
}

function bindEvents() {
  const ti = document.getElementById('textInput');
  if (ti) ti.addEventListener('input', e => { state.inputText = e.target.value; });
}

function setExercise(val) { state.exercise = val; render(); }
function setTime(val) { state.timeLimit = +val; document.getElementById('timelabel').textContent = val; }
function toggleListen(val) { state.listenMode = val; }

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  state.imageFile = file;
  state.imagePreview = URL.createObjectURL(file);
  render();
}

async function runOCR() {
  if (!state.imageFile) return;
  const btn = document.getElementById('ocrBtn');
  if (btn) { btn.textContent = 'Leser tekst...'; btn.disabled = true; }
  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(state.imageFile);
    });
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: state.imageFile.type, data: base64 } },
          { type: 'text', text: 'Trekk ut all tekst fra dette bildet. Returner kun teksten, ingen kommentarer.' }
        ]}]
      })
    });
    const data = await resp.json();
    state.inputText = data.content?.find(b => b.type === 'text')?.text || '';
    render();
  } catch(e) {
    alert('OCR feilet. Prøv igjen.');
    render();
  }
}

function startSession() {
  const w = tokenize(state.inputText);
  if (!w.length) return;
  state.words = w;
  state.wordStates = new Array(w.length).fill('none');
  state.currentIdx = 0;
  state.timeLeft = state.timeLimit;
  state.mode = 'reading';
  state.running = true;
  render();
  if (state.exercise === 'timed') startTimer();
  if (state.listenMode) startRecognition();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    const el = document.querySelector('.timer');
    if (el) { el.textContent = '⏱ ' + state.timeLeft + 's'; el.className = 'timer' + (state.timeLeft<=10?' urgent':''); }
    if (state.timeLeft <= 0) endSession();
  }, 1000);
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const rec = new SR();
  rec.lang = 'nb-NO'; rec.continuous = true; rec.interimResults = false;
  state.recognition = rec;
  rec.onresult = e => {
    const spoken = e.results[e.results.length-1][0].transcript.trim().toLowerCase().replace(/[.,!?;:]/g,'');
    handleSpokenWord(spoken);
  };
  rec.onerror = () => {};
  rec.onend = () => { if (state.running) rec.start(); };
  rec.start();
}

function stopRecognition() {
  if (state.recognition) { state.recognition.onend = null; state.recognition.stop(); }
}

function handleSpokenWord(spoken) {
  const i = state.currentIdx;
  if (i >= state.words.length) return;
  const expected = state.words[i].toLowerCase().replace(/[.,!?;:»«""'']/g,'');
  const correct = spoken === expected || spoken.includes(expected) || expected.includes(spoken);
  state.wordStates[i] = correct ? 'correct' : 'wrong';
  state.currentIdx++;
  render();
  if (state.exercise==='word' && state.currentIdx >= state.words.length) setTimeout(endSession, 400);
}

function markWord(i, val) {
  state.wordStates[i] = val;
  if (state.exercise === 'word' && i === state.currentIdx) {
    state.currentIdx++;
    if (state.currentIdx >= state.words.length) { render(); setTimeout(endSession, 400); return; }
  }
  render();
}

function clickWord(i) {
  if (state.listenMode || state.exercise !== 'timed') return;
  state.wordStates[i] = state.wordStates[i] === 'wrong' ? 'none' : 'wrong';
  render();
}

function endSession() {
  clearInterval(state.timerInterval);
  stopRecognition();
  state.running = false;
  state.mode = 'result';
  render();
}

function reset() {
  clearInterval(state.timerInterval);
  stopRecognition();
  state.mode = 'setup'; state.words = []; state.wordStates = [];
  state.currentIdx = 0; state.running = false;
  render();
}

function tryAgain() {
  state.wordStates = new Array(state.words.length).fill('none');
  state.currentIdx = 0; state.timeLeft = state.timeLimit;
  state.mode = 'reading'; state.running = true;
  render();
  if (state.exercise === 'timed') startTimer();
  if (state.listenMode) startRecognition();
}

render();
</script>
</body>
</html>
